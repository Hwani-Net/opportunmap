  <circle cx="980" cy="318" r="4" fill="#6B7280" opacity="0.3"/>
  <circle cx="1020" cy="318" r="18" fill="#3B5BDB"/>
  <text x="1020" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">15</text>
  <circle cx="1060" cy="318" r="4" fill="#E8590C"/>
  <circle cx="1100" cy="318" r="4" fill="#6B7280" opacity="0.3"/>

  <circle cx="900" cy="358" r="4" fill="#0CA678"/>
