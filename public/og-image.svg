<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F8FA"/>
      <stop offset="100%" style="stop-color:#EEF1FB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#3B5BDB"/>

  <!-- Category dots -->
  <circle cx="120" cy="200" r="60" fill="#3B5BDB" opacity="0.08"/>
  <circle cx="1100" cy="450" r="80" fill="#0CA678" opacity="0.08"/>
  <circle cx="1050" cy="130" r="40" fill="#E8590C" opacity="0.08"/>

  <!-- Logo area -->
  <rect x="80" y="80" width="48" height="48" rx="12" fill="#3B5BDB"/>
  <text x="104" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="white">O</text>

  <!-- Brand name -->
  <text x="144" y="114" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#1A1A2E">OpportuMap</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#1A1A2E">공모전·해커톤·지원금</text>
  <text x="80" y="318" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#3B5BDB">한 곳에서</text>

  <!-- Subtext -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="28" fill="#6B7280">마감일 놓치지 마세요. 캘린더로 한눈에 확인하세요.</text>

  <!-- Category pills -->
  <rect x="80" y="440" width="140" height="44" rx="22" fill="#3B5BDB" opacity="0.12"/>
  <text x="150" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3B5BDB">공모전</text>

  <rect x="236" y="440" width="140" height="44" rx="22" fill="#0CA678" opacity="0.12"/>
  <text x="306" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0CA678">해커톤</text>

  <rect x="392" y="440" width="140" height="44" rx="22" fill="#E8590C" opacity="0.12"/>
  <text x="462" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#E8590C">예창패</text>

  <rect x="548" y="440" width="140" height="44" rx="22" fill="#E03131" opacity="0.12"/>
  <text x="618" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#E03131">지원금</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="20" fill="#9CA3AF">fuel-price-alert-kr2.web.app</text>

  <!-- Right decorative calendar -->
  <rect x="850" y="180" width="280" height="280" rx="24" fill="white" opacity="0.7"/>
  <rect x="850" y="180" width="280" height="52" rx="24" fill="#3B5BDB"/>
  <rect x="850" y="208" width="280" height="24" fill="#3B5BDB"/>
  <text x="990" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">2026년 4월</text>

  <!-- Calendar grid dots -->
  <circle cx="900" cy="278" r="4" fill="#3B5BDB"/>
  <circle cx="940" cy="278" r="4" fill="#0CA678"/>
  <circle cx="980" cy="278" r="4" fill="#E8590C"/>
