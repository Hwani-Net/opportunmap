  <circle cx="1100" cy="358" r="4" fill="#0CA678"/>

  <circle cx="900" cy="398" r="4" fill="#6B7280" opacity="0.3"/>
  <circle cx="940" cy="398" r="4" fill="#E8590C"/>
  <circle cx="980" cy="398" r="4" fill="#3B5BDB"/>
  <circle cx="1020" cy="398" r="4" fill="#6B7280" opacity="0.3"/>
  <circle cx="1060" cy="398" r="4" fill="#E03131"/>
  <circle cx="1100" cy="398" r="4" fill="#6B7280" opacity="0.3"/>
</svg>
